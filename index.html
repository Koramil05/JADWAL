<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Jadwal Piket Koramil 1609-05/Sukasada</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            -webkit-box-sizing: border-box;
            -moz-box-sizing: border-box;
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #003300;

            font-size: 16px;

        .container {
            max-width: 900px;
            margin: 0 auto;

            border-radius: 10px;
            padding: 15px;

            box-shadow: 0 0 15px rgba(0, 100, 0, 0.5);
        }
        
        header {
            text-align: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #4dff4d;
        }
        
        .logo-container {
            display: block;
            text-align: center;

        }
        
        .logo {
            max-width: 100%;
            height: auto;
            max-height: 120px;

            -webkit-box-shadow: 0 0 10px rgba(0, 255, 0, 0.3);
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.3);
        }
        
        h1 {
            color: #4dff4d;
            margin-bottom: 10px;
            font-size: 24px;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
        }
        
        /* Running text style */
        .running-text-container {
            background: rgba(0, 30, 0, 0.7);
            border-radius: 8px;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ffcc00;
            overflow: hidden;
            white-space: nowrap;
        }
        
        .running-text {
            display: inline-block;
            white-space: nowrap;
            animation: marquee 15s linear infinite;
            color: #ffcc00;
            font-weight: bold;
            font-size: 16px;
            padding-right: 50px;
        }
        
        @keyframes marquee {
            0% {
                transform: translateX(100%);
            }
            100% {
                transform: translateX(-100%);
            }
        }
        
        .running-text-container:hover .running-text {
            animation-play-state: paused;
        }
        
        .section {

        h2 {

            display: -ms-flexbox;

            -webkit-box-align: center;
            -ms-flex-align: center;

            -webkit-box-pack: center;
            -ms-flex-pack: center;

            text-align: center;
        }
        
        h2 i {
            margin-right: 10px;
        }
        
        h3 {
            margin: 10px 0;

        }

        }
        
        select, textarea {

            background-color: rgba(0, 40, 0, 0.8);

            -moz-appearance: none;

        select:focus, textarea:focus {

        /* Textarea dengan auto height */
        .auto-height-textarea {
            min-height: 100px;
            resize: none;
            overflow-y: hidden;
            transition: height 0.1s ease;
            font-family: 'Times New Roman', Times, serif;

        textarea[readonly] {

        /* Tombol WhatsApp */
        .whatsapp-simple {

        .toast {
            position: fixed;

        .toast.show {

        }
        
        .row {
            display: -webkit-box;
            display: -ms-flexbox;
            display: flex;
            -ms-flex-wrap: wrap;

        }

            border-color: #ff4d4d;
        }

        @media screen and (max-width: 768px) {
            body {

            }

            }
            .logo {
                max-height: 100px;
            }
            .row {
                -webkit-box-orient: vertical;
                -webkit-box-direction: normal;
                -ms-flex-direction: column;
                flex-direction: column;
            }
            .col {
                -webkit-box-flex: 0;
                -ms-flex: 0 0 100%;

            }
            select, textarea {
                font-size: 14px;

            }
            .whatsapp-simple {

            }

        @media screen and (max-width: 480px) {

            }

            .connection-status {
                position: relative;

                right: 0;
                margin-bottom: 10px;

            }
            .whatsapp-simple {
                padding: 8px;
                gap: 5px;
            }
            .whatsapp-simple i {
                font-size: 20px;
            }
            .whatsapp-simple span {
                font-size: 12px;
            }
        }
        
        .section-content {
            display: block;
        }
        
        .section-content > div {
            margin-bottom: 15px;
        }
        
        @media screen and (min-width: 601px) {
            .section-content {
                display: -webkit-box;

            }
            .section-content > div {
                -webkit-box-flex: 1;
                -ms-flex: 1;
                flex: 1;
                min-width: 250px;
            }
        }
        
        button {
            user-select: none;
            touch-action: manipulation;
            cursor: pointer;
        }
    </style>
</head>

    <div class="toast" id="toastNotification"></div>

    <script>
        (function() {
            const GITHUB_URLS = {
                HANPANGAN: "https://raw.githubusercontent.com/Koramil05/JADWAL/main/hanpangan.txt",
                PIKET: "https://raw.githubusercontent.com/Koramil05/JADWAL/main/piket.txt"
            };

            const AppData = {
                daftarNama: [],
                daftarHanpangan: [],
                currentHanpangan: "",
                isOnline: navigator.onLine,
                lastSelections: {}
            };

            const UI = {
                hasilPesan: document.getElementById('hasilPesan'),
                loadingIndicator: document.getElementById('loadingIndicator'),
                toastNotification: document.getElementById('toastNotification'),
                connectionStatus: document.getElementById('connectionStatus'),
                statusText: document.getElementById('statusText'),
                runningText: document.getElementById('runningText')
            };

            const DROPDOWN_IDS = [
                'nama1a', 'nama1b', 'nama2a', 'nama2b', 
                'nama3a', 'nama3b', 'nama3c', 'nama3d',
                'nama4a', 'nama4b', 'nama4c', 'nama4d'
            ];

            function showToast(message, duration = 3000) {
                const toast = UI.toastNotification;
                toast.textContent = message;
                toast.classList.add('show');
                setTimeout(function() { toast.classList.remove('show'); }, duration);
            }

            function updateRunningText() {
                if (UI.runningText) {
                    if (AppData.currentHanpangan) {
                        UI.runningText.textContent = '🍽️ JADWAL HANPANGAN HARI INI: ' + AppData.currentHanpangan + ' 🍽️';
                    } else {
                        UI.runningText.textContent = '🍽️ Memuat jadwal hanpangan... 🍽️';
                    }
                }
            }

            // Fungsi untuk mengatur tinggi textarea secara otomatis
            function autoResizeTextarea() {
                const textarea = UI.hasilPesan;
                if (textarea) {
                    textarea.style.height = 'auto';
                    textarea.style.height = textarea.scrollHeight + 'px';
                }
            }

            function updateConnectionStatus() {
                AppData.isOnline = navigator.onLine;
                if (AppData.isOnline) {
                    UI.connectionStatus.classList.add('online');
                    UI.connectionStatus.classList.remove('offline');
                    UI.statusText.textContent = 'Online';
                } else {
                    UI.connectionStatus.classList.add('offline');
                    UI.connectionStatus.classList.remove('online');
                    UI.statusText.textContent = 'Offline';
                    showToast("Anda sedang offline. Data akan dimuat saat koneksi kembali.");
                }
            }

            function fetchDataFromGitHub(url) {
                return new Promise(function(resolve) {
                    var cacheBuster = '?t=' + new Date().getTime();
                    if (window.fetch) {
                        fetch(url + cacheBuster)
                            .then(function(res) { return res.ok ? res.text() : null; })
                            .then(function(data) { resolve(data); })
                            .catch(function() { resolve(null); });
                    } else {
                        var xhr = new XMLHttpRequest();
                        xhr.open('GET', url + cacheBuster, true);
                        xhr.onreadystatechange = function() {
                            if (xhr.readyState === 4) resolve(xhr.status === 200 ? xhr.responseText : null);
                        };
                        xhr.send();
                    }
                });
            }

            function loadPiketData() {
                return fetchDataFromGitHub(GITHUB_URLS.PIKET).then(function(data) {
                    if (data) {
                        AppData.daftarNama = data.trim().split('\n').filter(function(l) { return l.trim(); }).map(function(n) { return n.trim(); });
                        
                        DROPDOWN_IDS.forEach(function(id) {
                            var select = document.getElementById(id);
                            if (!select) return;
                            
                            select.innerHTML = '';
                            
                            var defaultOption = document.createElement('option');
                            defaultOption.value = '';
                            defaultOption.textContent = '-- Pilih Nama --';
                            select.appendChild(defaultOption);
                            
                            AppData.daftarNama.forEach(function(nama) {
                                var option = document.createElement('option');
                                option.value = nama;
                                option.textContent = nama;
                                select.appendChild(option);
                            });
                            
                            select.value = "";
                            AppData.lastSelections[id] = "";
                        });
                        return true;
                    }
                    return false;
                });
            }

            function loadHanpanganData() {
                return fetchDataFromGitHub(GITHUB_URLS.HANPANGAN).then(function(data) {
                    if (data) {
                        var lines = data.trim().split('\n').filter(function(l) { return l.trim(); });
                        if (lines.length) {
                            AppData.daftarHanpangan = lines;
                            var today = new Date();
                            var dayOfMonth = today.getDate();
                            AppData.currentHanpangan = lines[(dayOfMonth - 1) % lines.length];
                            updateRunningText();
                            return true;
                        }
                    }
                    updateRunningText();
                    return false;
                });
            }

            function updatePreview() {
                var now = new Date();
                var tomorrow = new Date(); 
                tomorrow.setDate(now.getDate() + 1);
                
                var formatTanggal = function(date) {
                    var days = ["Minggu","Senin","Selasa","Rabu","Kamis","Jumat","Sabtu"];
                    var months = ["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];
                    return days[date.getDay()] + ", " + date.getDate() + " " + months[date.getMonth()] + " " + date.getFullYear();
                };
                
                var result = "=======================\n" +
                             "KORAMIL 1609-05/SUKASADA\n" +
                             "    JADWAL DINAS DALAM\n" +
                             "=======================\n\n";
                
                var getVal = function(id) {
                    var el = document.getElementById(id);
                    return el ? el.value : "";
                };
                
                var piketKoramilHariIni = [getVal('nama1a'), getVal('nama1b')].filter(function(n) { return n && n.trim() !== ""; });
                var piketKoramilBesok = [getVal('nama2a'), getVal('nama2b')].filter(function(n) { return n && n.trim() !== ""; });
                var jagaKediamanHariIni = [getVal('nama3a'), getVal('nama3b')].filter(function(n) { return n && n.trim() !== ""; });
                var jagaKediamanBesok = [getVal('nama3c'), getVal('nama3d')].filter(function(n) { return n && n.trim() !== ""; });
                var piketMakodimHariIni = [getVal('nama4a'), getVal('nama4b')].filter(function(n) { return n && n.trim() !== ""; });
                var piketMakodimBesok = [getVal('nama4c'), getVal('nama4d')].filter(function(n) { return n && n.trim() !== ""; });
                
                var sectionCount = 0;
                
                if (piketKoramilHariIni.length) {
                    result += String.fromCharCode(65+sectionCount) + ". " + formatTanggal(now) + "\n";
                    piketKoramilHariIni.forEach(function(n,i){ result += "   " + (i+1) + ". " + n + "\n"; });
                    result += "\n"; sectionCount++;
                }
                if (piketKoramilBesok.length) {
                    result += String.fromCharCode(65+sectionCount) + ". " + formatTanggal(tomorrow) + "\n";
                    piketKoramilBesok.forEach(function(n,i){ result += "   " + (i+1) + ". " + n + "\n"; });
                    result += "\n"; sectionCount++;
                }
                if (jagaKediamanHariIni.length) {
                    result += String.fromCharCode(65+sectionCount) + ". " + formatTanggal(now) + " (Kediaman)\n";
                    jagaKediamanHariIni.forEach(function(n,i){ result += "   " + (i+1) + ". " + n + "\n"; });
                    result += "\n"; sectionCount++;
                }
                if (jagaKediamanBesok.length) {
                    result += String.fromCharCode(65+sectionCount) + ". " + formatTanggal(tomorrow) + " (Kediaman)\n";
                    jagaKediamanBesok.forEach(function(n,i){ result += "   " + (i+1) + ". " + n + "\n"; });
                    result += "\n"; sectionCount++;
                }
                if (piketMakodimHariIni.length) {
                    result += String.fromCharCode(65+sectionCount) + ". " + formatTanggal(now) + " (Makodim)\n";
                    piketMakodimHariIni.forEach(function(n,i){ result += "   " + (i+1) + ". " + n + "\n"; });
                    result += "\n"; sectionCount++;
                }
                if (piketMakodimBesok.length) {
                    result += String.fromCharCode(65+sectionCount) + ". " + formatTanggal(tomorrow) + " (Makodim)\n";
                    piketMakodimBesok.forEach(function(n,i){ result += "   " + (i+1) + ". " + n + "\n"; });
                    result += "\n"; sectionCount++;
                }
                
                if (AppData.currentHanpangan) {
                    result += "- Jadwal Hanpangan hari ini : " + AppData.currentHanpangan + "\n\n";
                }
                
                result += "Demikian MMP.";
                UI.hasilPesan.value = result;
                
                // Auto resize textarea setelah konten diupdate
                setTimeout(autoResizeTextarea, 10);
            }

            function sendToWhatsApp() {
                var pesan = UI.hasilPesan.value.trim();
                if (!pesan) {
                    showToast("Tidak ada pesan untuk dikirim");
                    return false;
                }
                var encoded = encodeURIComponent(pesan);
                window.open("https://wa.me/?text=" + encoded, "_blank");
                showToast("Membuka WhatsApp...");
                return false;
            }

            var isLoading = false;
            function loadAllData() {
                if (isLoading) return;
                isLoading = true;
                UI.loadingIndicator.style.display = 'block';
                
                Promise.all([loadPiketData(), loadHanpanganData()])
                    .then(function() {
                        DROPDOWN_IDS.forEach(function(id) {
                            var select = document.getElementById(id);
                            if (select) {
                                select.value = "";
                            }
                        });
                        updatePreview();
                        showToast("Data berhasil dimuat - Pilih nama untuk mulai");
                    })
                    .catch(function() {
                        showToast("Gagal memuat data");
                    })
                    .finally(function() {
                        UI.loadingIndicator.style.display = 'none';
                        isLoading = false;
                    });
            }

            function initApp() {
                updateConnectionStatus();
                
                DROPDOWN_IDS.forEach(function(id) {
                    var select = document.getElementById(id);
                    if (select) {
                        select.addEventListener('change', updatePreview);
                    }
                });
                
                loadAllData();
                
                // Inisialisasi auto resize
                autoResizeTextarea();
            }

            // Pasang event listener untuk tombol WhatsApp
            var whatsappBtn = document.getElementById('whatsappBtn');
            if (whatsappBtn) {
                var newBtn = whatsappBtn.cloneNode(true);
                whatsappBtn.parentNode.replaceChild(newBtn, whatsappBtn);
                newBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    sendToWhatsApp();
                    return false;
                });
            }

            window.addEventListener('online', function() {
                updateConnectionStatus();
                loadAllData();
            });
            window.addEventListener('offline', updateConnectionStatus);

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', initApp);
            } else {
                initApp();
            }
        })();
    </script>
</body>
</html>
